<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SQL Designer | Diagramas ER</title>
  <meta name="description" content="Gere diagramas ER interativos instantaneamente a partir de comandos SQL CREATE TABLE. Arraste tabelas, visualize relacionamentos e exporte schemas.">
  <link rel="icon" type="image/svg+xml" href="docs/logo.svg">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Sidebar Panel -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="logo-section">
        <img class="logo-icon" src="docs/logo.svg" alt="sqlview-er">
        <div>
          <h1>SQL Designer</h1>
          <p data-i18n="subtitle">Editor de Diagramas ER</p>
        </div>
      </div>
      <button id="sidebar-collapse-btn" class="icon-btn" data-i18n-title="collapseSidebar" title="Recolher painel (Ctrl+B)">❮</button>
    </div>

    <!-- SQL DDL Input Section -->
    <div class="editor-section">
      <select id="project-select" class="sample-select project-select" data-i18n-title="projectCombo" title="Alternar entre projetos"></select>

      <button id="editor-fold-btn" class="label-toggle" data-i18n-title="foldEditor" title="Mostrar/ocultar o editor SQL">
        <span class="fold-chevron">▾</span>
        <span data-i18n="sqlSection">CÓDIGO SQL (DDL)</span>
        <span id="fold-hint" class="fold-hint"></span>
      </button>

      <!-- Snippet contextual: DDL do objeto selecionado quando o editor está dobrado -->
      <div id="sql-snippet" class="sql-snippet" hidden>
        <div class="snippet-title">⌖ <span id="snippet-name"></span></div>
        <pre class="snippet-pre"><code id="snippet-code"></code></pre>
      </div>

      <div class="editor-wrapper">
        <button id="comments-toggle" class="comments-toggle" data-i18n-title="lblHideComments" title="Ocultar comentários do SQL">-- <span data-i18n="lblComments">comentários</span></button>
        <pre id="sql-highlight-layer" class="sql-highlight" aria-hidden="true"><code id="sql-highlight-code"></code></pre>
        <textarea id="sql-editor-input" class="sql-editor" spellcheck="false" data-i18n-placeholder="editorPlaceholder" placeholder="Cole aqui seus comandos SQL CREATE TABLE..."></textarea>
        <!-- Visão limpa (sem comentários), somente leitura -->
        <pre id="sql-clean-view" class="sql-highlight sql-clean" hidden><code id="sql-clean-code"></code></pre>
      </div>
    </div>

    <!-- Buttons -->
    <div class="action-buttons">
      <button id="upload-btn" class="btn btn-secondary" data-i18n-title="titleImport" title="Importar arquivo SQL">
        <span data-i18n="btnImport">📂 Importar SQL</span>
      </button>
      <button id="clear-btn" class="btn btn-secondary" data-i18n-title="titleClear" title="Limpar editor">
        <span data-i18n="btnClear">🧹 Limpar</span>
      </button>
      <button id="save-project-btn" class="btn btn-primary" data-i18n-title="titleSaveProj" title="Salvar projeto (SQL + posições + visão)">
        <span data-i18n="btnSaveProj">💾 Salvar projeto</span>
      </button>
      <button id="open-project-btn" class="btn btn-secondary" data-i18n-title="titleOpenProj" title="Abrir projeto salvo">
        <span data-i18n="btnOpenProj">📁 Abrir projeto</span>
      </button>
      <input type="file" id="sql-file-input" accept=".sql,.txt" style="display: none;">
      <input type="file" id="project-file-input" accept=".json,application/json" style="display: none;">
    </div>

    <!-- Outline Table List -->
    <div class="outline-section">
      <div class="section-label">
        <span data-i18n="outlineTitle">TABELAS EXTRAÍDAS</span>
      </div>
      <div id="table-outline-list" class="outline-list">
        <!-- populated by app.js -->
      </div>
    </div>

  </aside>

  <!-- Interactive Canvas Area -->
  <main id="canvas-container" class="canvas-container">

    <!-- Reopen chip (shown when the sidebar is collapsed) -->
    <button id="sidebar-open-btn" class="sidebar-open-btn" data-i18n-title="expandSidebar" title="Mostrar painel (Ctrl+B)" hidden>❯</button>
    
    <!-- Virtual viewports for Zoom & Pan -->
    <div id="canvas-viewport" class="canvas-viewport">
      <!-- Background SVG overlay (behind cards) -->
      <svg id="svg-connections-back" class="svg-overlay svg-back"></svg>
      <!-- HTML Table Node Cards container -->
      <div id="card-container" class="card-container"></div>
      <!-- Foreground SVG overlay (above cards) -->
      <svg id="svg-connections-front" class="svg-overlay svg-front"></svg>
      <!-- Elevated card layer: focused/connected cards go here so highlighted lines pass UNDER them -->
      <div id="card-container-top" class="card-container card-container-top"></div>
    </div>

    <!-- Help Instruction Overlay -->
    <div class="helper-overlay">
      <div class="helper-row">
        <span class="helper-key" data-i18n="helpMoveTableKey">Clique + arrastar cabeçalho</span>
        <span data-i18n="helpMoveTable">Mover tabela</span>
      </div>
      <div class="helper-row">
        <span class="helper-key" data-i18n="helpPanKey">Botão direito/meio + arrastar</span>
        <span data-i18n="helpPan">Mover canvas</span>
      </div>
      <div class="helper-row">
        <span class="helper-key" data-i18n="helpZoomKey">Roda do mouse</span>
        <span data-i18n="helpZoom">Zoom</span>
      </div>
    </div>

    <!-- Floating Canvas Controls -->
    <div class="floating-toolbar">
      <button id="zoom-in-btn" class="toolbar-btn" data-i18n-title="zoomIn" title="Aproximar">➕</button>
      <button id="zoom-out-btn" class="toolbar-btn" data-i18n-title="zoomOut" title="Afastar">➖</button>
      <button id="zoom-reset-btn" class="toolbar-btn" data-i18n-title="zoomReset" title="Restaurar zoom (1:1)">🔄</button>
      <button id="zoom-fit-btn" class="toolbar-btn" data-i18n-title="zoomFit" title="Ajustar à tela">🔍</button>

      <div class="toolbar-divider"></div>

      <button id="arrange-force-btn" class="toolbar-btn" data-i18n-title="arrangeForce" title="Organizar automaticamente">🧲</button>
      <button id="arrange-grid-btn" class="toolbar-btn" data-i18n-title="arrangeGrid" title="Organizar em grade">🔢</button>
      <button id="arrange-circle-btn" class="toolbar-btn" data-i18n-title="arrangeCircle" title="Organizar em círculo">⚪</button>

      <div class="toolbar-divider"></div>

      <button id="export-svg-btn" class="toolbar-btn" data-i18n-title="exportSvg" title="Exportar como imagem SVG">💾</button>
      <button id="settings-btn" class="toolbar-btn" data-i18n-title="settingsTitle" title="Configurações">⚙️</button>
    </div>
  </main>

  <!-- Settings Modal -->
  <div id="settings-overlay" class="settings-overlay" hidden>
    <div class="settings-modal">
      <div class="settings-header">
        <span data-i18n="settingsTitle">Configurações</span>
        <button id="settings-close-btn" class="icon-btn" data-i18n-title="close" title="Fechar">✕</button>
      </div>

      <div class="settings-section">
        <div class="settings-section-title" data-i18n="settingsLang">Idioma</div>
        <div id="settings-lang-list" class="settings-lang-list">
          <!-- populated dynamically from lang.js -->
        </div>
      </div>

      <div class="settings-section">
        <div class="settings-section-title" data-i18n="settingsView">Visualização</div>
        <label class="switch-row">
          <span data-i18n="lblTriggers">Exibir triggers</span>
          <input type="checkbox" id="switch-triggers" class="switch-input" checked>
          <span class="switch-slider"></span>
        </label>
        <label class="switch-row">
          <span data-i18n="lblProcs">Exibir procedures e functions</span>
          <input type="checkbox" id="switch-procs" class="switch-input" checked>
          <span class="switch-slider"></span>
        </label>
        <label class="switch-row">
          <span data-i18n="lblHideComments">Ocultar comentários do SQL</span>
          <input type="checkbox" id="switch-comments" class="switch-input">
          <span class="switch-slider"></span>
        </label>
      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="lang.js"></script>
  <script src="syntax.js"></script>
  <script src="parser.js"></script>
  <script src="canvas.js"></script>
  <script src="app.js"></script>
</body>
</html>
